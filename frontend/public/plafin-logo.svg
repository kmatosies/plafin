<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none">
  <!-- Ícone quadrado com bordas arredondadas -->
  <rect width="40" height="40" rx="10" fill="#1E3A8A"/>

  <!-- Letra P estilizada com seta de crescimento integrada -->
  <!-- Haste vertical do P -->
  <rect x="12" y="10" width="4" height="21" rx="2" fill="white"/>
  <!-- Arco superior do P -->
  <path d="M16 10 H22 Q30 10 30 18 Q30 26 22 26 H16" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Seta de crescimento (linha diagonal e pontinha) -->
  <line x1="22" y1="24" x2="28" y2="18" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
  <polyline points="24,18 28,18 28,22" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Texto "Plafin" -->
  <text x="48" y="26" font-family="'Inter', 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#1E3A8A" letter-spacing="-0.5">Plafin</text>
</svg>
